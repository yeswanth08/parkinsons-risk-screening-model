name: Build and Push Parkinsons ML Models

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=v1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # Build Classification Image
      - name: Build and push Classification model
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.classification
          push: true
          tags: |
            curiousyeswanth/parkinsons-classification-model:${{ steps.version.outputs.VERSION }}
            curiousyeswanth/parkinsons-classification-model:latest

      # Build Severity Image
      - name: Build and push Severity model
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.severity
          push: true
          tags: |
            curiousyeswanth/parkinsons-severity-regression-model:${{ steps.version.outputs.VERSION }}
            curiousyeswanth/parkinsons-severity-regression-model:latest