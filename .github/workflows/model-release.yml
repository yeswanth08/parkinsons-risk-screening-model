name: Release Parkinsons ML Models

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/bin/classfication_model.pkl
            app/bin/severity_model.pkl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Python Parkinsons voice screening repo
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.VOICE_REPO_PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/yeswanth08/python-parkinsons-orchestrator/dispatches \
          -d '{"event_type":"model_updated","client_payload":{"version":"${{ github.ref_name }}"}}'